name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Get LTW
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          repo: MojoLauncher/LTW
          workflow: android.yml
          workflow_conclusion: success
          name: output-aar
          path: app_pojavlauncher/libs

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Create out directory
        run: mkdir -p out

      # Build Debug APK
      - name: Build Debug APK
        run: |
          gradle :app_pojavlauncher:assembleFullDebug
          mv app_pojavlauncher/build/outputs/apk/full/debug/app_pojavlauncher-full-debug.apk out/app-debug-full.apk

      # Build No Runtime APK
      - name: Build Debug APK (No runtime)
        run: |
          gradle :app_pojavlauncher:assembleNoruntimeDebug
          mv app_pojavlauncher/build/outputs/apk/noruntime/debug/app_pojavlauncher-noruntime-debug.apk out/app-debug-noruntime.apk

      # Generate checksums
      - name: Generate MD5 checksums
        run: |
          md5sum out/app-debug-full.apk > out/app-debug-full.md5
          md5sum out/app-debug-noruntime.apk > out/app-debug-noruntime.md5

      # Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: out/app-debug-full.apk

      # Upload Debug APK No Runtime
      - name: Upload Debug APK (No runtime)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-noruntime
          path: out/app-debug-noruntime.apk

      # Upload MD5 files
      - name: Upload MD5 Checksums
        uses: actions/upload-artifact@v4
        with:
          name: md5-checksums
          path: |
            out/app-debug-full.md5
            out/app-debug-noruntime.md5

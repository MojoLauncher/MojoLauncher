name: Final FearLauncher Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Clone original PojavLauncher for reference
        run: git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher.git /tmp/pojav

      - name: Copy original build.gradle
        run: cp /tmp/pojav/app_pojavlauncher/build.gradle app_fearlauncher/build.gradle

      - name: Rebrand namespace & applicationId
        run: |
          sed -i "s/namespace 'git\.artdeell\.mojo'/namespace 'net.kdt.fearlaunch'/" app_fearlauncher/build.gradle
          sed -i 's/applicationId "git\.artdeell\.mojo"/applicationId "com.fearlauncher.app"/' app_fearlauncher/build.gradle
          sed -i 's/git\.artdeell\.mojo/com.fearlauncher.app/g' app_fearlauncher/build.gradle

      # productFlavors ko afterEvaluate se nikaal kar android block mein dalo
      - name: Move productFlavors outside afterEvaluate
        run: |
          python3 << 'EOF'
          import re
          with open("app_fearlauncher/build.gradle", "r") as f:
              content = f.read()
          # Find afterEvaluate block and extract productFlavors if inside
          # PojavLauncher's afterEvaluate contains productFlavors definition inside it for some reason? Actually not, productFlavors is in android block. But check.
          # Safer: ensure productFlavors exists in android block.
          if "productFlavors" not in content:
              # Inject productFlavors right after flavorDimensions line (which is present)
              content = re.sub(
                  r'(flavorDimensions\s*=\s*\[.*?\]\s*\n)',
                  r'\1    productFlavors {\n        full { dimension "runtime" }\n        noruntime { dimension "runtime"; versionNameSuffix "-noruntime" }\n    }\n',
                  content
              )
          # Remove the entire afterEvaluate block to avoid Groovy compilation errors
          content = re.sub(r'afterEvaluate\s*\{.*?\n}\n', '', content, flags=re.DOTALL)
          with open("app_fearlauncher/build.gradle", "w") as f:
              f.write(content)
          EOF

      - name: Ensure required modules in settings.gradle
        run: |
          for mod in dnbglfw forge_installer; do
            if ! grep -q "':$mod'" settings.gradle; then
              echo "include ':$mod'" >> settings.gradle
            fi
          done

      - name: Commit all fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix productFlavors and remove afterEvaluate" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with wrapper
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

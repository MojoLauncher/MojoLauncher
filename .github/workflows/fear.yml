name: Final Build with Flavors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # ✅ FIX: 'fatal: No names found' git describe error fix

      - name: Clone original PojavLauncher
        run: git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher.git /tmp/pojav

      - name: Copy original build.gradle
        run: cp /tmp/pojav/app_pojavlauncher/build.gradle app_fearlauncher/build.gradle

      - name: Rebrand namespace & applicationId
        run: |
          sed -i "s/namespace 'git\.artdeell\.mojo'/namespace 'net.kdt.fearlaunch'/" app_fearlauncher/build.gradle
          sed -i 's/applicationId "git\.artdeell\.mojo"/applicationId "com.fearlauncher.app"/' app_fearlauncher/build.gradle
          sed -i 's/git\.artdeell\.mojo/com.fearlauncher.app/g' app_fearlauncher/build.gradle

      # ✅ FIX: Reliable Python script instead of broken sed injection
      - name: Inject productFlavors Safely
        run: |
          python3 << 'EOF'
          import re
          
          gradle_path = "app_fearlauncher/build.gradle"
          with open(gradle_path, "r") as f:
              content = f.read()
          
          flavors_block = """
              productFlavors {
                  full {
                      dimension "runtime"
                  }                  noruntime {
                      dimension "runtime"
                      versionNameSuffix "-noruntime"
                  }
              }
          """
          
          # flavorDimensions ke turant baad productFlavors inject karein
          pattern = r'(flavorDimensions\s*=?\s*[\["\']runtime[\]"\'])'
          if re.search(pattern, content):
              content = re.sub(pattern, r'\1' + flavors_block, content, count=1)
          else:
              # Fallback: android block ke andar dimensions + flavors dono add karein
              android_pattern = r'(android\s*\{)'
              fallback = r'\1\n    flavorDimensions "runtime"' + flavors_block
              content = re.sub(android_pattern, fallback, content, count=1)
          
          with open(gradle_path, "w") as f:
              f.write(content)
              
          print("✅ productFlavors injected successfully")
          EOF

      - name: Remove afterEvaluate block
        run: |
          python3 -c "
          import re
          path = 'app_fearlauncher/build.gradle'
          with open(path, 'r') as f: content = f.read()
          content = re.sub(r'afterEvaluate\s*\{[^{}]*(?:\{[^{}]*\}[^{}]*)*\}', '', content, flags=re.DOTALL)
          with open(path, 'w') as f: f.write(content)
          print('✅ afterEvaluate block removed')
          "

      - name: Ensure required modules in settings.gradle
        run: |
          for mod in dnbglfw forge_installer; do
            if ! grep -q "':$mod'" settings.gradle; then
              echo "include ':$mod'" >> settings.gradle
            fi
          done

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add productFlavors, remove afterEvaluate" || echo "No changes to commit"
          git push
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ FIX: NDK + Gradle caching (saves ~2 mins per build)
      - name: Cache Gradle & NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_HOME }}/ndk
          key: ${{ runner.os }}-fearlauncher-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-fearlauncher-

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app_fearlauncher:assembleFullDebug --no-daemon --stacktrace
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

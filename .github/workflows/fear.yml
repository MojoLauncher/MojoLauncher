name: Build FearLauncher (Fixed)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # Ensure productFlavors block exists in app_fearlauncher/build.gradle
      - name: Ensure productFlavors in build.gradle
        run: |
          if ! grep -q "productFlavors" app_fearlauncher/build.gradle; then
            # Insert productFlavors right after flavorDimensions line
            sed -i "/flavorDimensions/a \    productFlavors {\n        full { dimension \"runtime\" }\n        noruntime { dimension \"runtime\"; versionNameSuffix \"-noruntime\" }\n    }" app_fearlauncher/build.gradle
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_fearlauncher/build.gradle
          git commit -m "Add productFlavors if missing" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          mv app_fearlauncher/build/outputs/apk/full/debug/app_fearlauncher-full-debug.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

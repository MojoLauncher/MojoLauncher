name: Build FearLauncher (Simple)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # Ensure settings.gradle includes app_fearlauncher
      - name: Fix settings.gradle
        run: |
          if ! grep -q "':app_fearlauncher'" settings.gradle; then
            # Remove any old module includes
            sed -i '/^include/d' settings.gradle
            echo "include ':app_fearlauncher'" >> settings.gradle
          fi

      # Ensure productFlavors exist in build.gradle
      - name: Add productFlavors if missing
        run: |
          if ! grep -q "productFlavors" app_fearlauncher/build.gradle; then
            sed -i "/flavorDimensions/a \    productFlavors {\n        full { dimension \"runtime\" }\n        noruntime { dimension \"runtime\"; versionNameSuffix \"-noruntime\" }\n    }" app_fearlauncher/build.gradle
          fi

      # Commit all config fixes (if any)
      - name: Commit config fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.gradle app_fearlauncher/build.gradle
          git commit -m "Ensure module and flavors correct" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

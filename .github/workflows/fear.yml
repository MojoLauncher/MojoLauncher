name: Auto Detect Module & Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # Step 1: Determine correct module folder
      - name: Detect module folder
        id: detect
        run: |
          if [ -d "app_fearlauncher" ]; then
            echo "MODULE=app_fearlauncher" >> $GITHUB_OUTPUT
          elif [ -d "app_pojavlauncher" ]; then
            echo "MODULE=app_pojavlauncher" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No module folder found!"
            exit 1
          fi

      # Step 2: Ensure settings.gradle includes that module
      - name: Update settings.gradle if needed
        run: |
          MODULE="${{ steps.detect.outputs.MODULE }}"
          if ! grep -q "':$MODULE'" settings.gradle; then
            # Remove any old module include and add the correct one
            sed -i "/include/d" settings.gradle
            echo "include ':$MODULE'" >> settings.gradle
          fi

      # Step 3: Ensure productFlavors exist in module's build.gradle
      - name: Add productFlavors if missing
        run: |
          MODULE="${{ steps.detect.outputs.MODULE }}"
          if ! grep -q "productFlavors" $MODULE/build.gradle; then
            sed -i "/flavorDimensions/a \    productFlavors {\n        full { dimension \"runtime\" }\n        noruntime { dimension \"runtime\"; versionNameSuffix \"-noruntime\" }\n    }" $MODULE/build.gradle
          fi

      # Step 4: Commit changes (if any)
      - name: Commit configuration fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.gradle $MODULE/build.gradle
          git commit -m "Fix module configuration" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 5: Build using detected module
      - name: Build APK
        run: |
          MODULE="${{ steps.detect.outputs.MODULE }}"
          ./gradlew :$MODULE:assembleFullDebug
          mkdir -p out
          cp $MODULE/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

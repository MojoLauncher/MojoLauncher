name: Fix Build Gradle & Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Overwrite build.gradle with correct flavors
        run: |
          cat > app_pojavlauncher/build.gradle << 'BUILDEOF'
          # ----- PASTE THE CORRECTED BUILD.GRADLE CODE FROM ABOVE -----
          # (include plugins, android block, dependencies, etc.)
          BUILDEOF

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_pojavlauncher/build.gradle
          git commit -m "Restore productFlavors in build.gradle" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          ./gradlew :app_pojavlauncher:assembleFullDebug
          mkdir -p out
          mv app_pojavlauncher/build/outputs/apk/full/debug/app_pojavlauncher-full-debug.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

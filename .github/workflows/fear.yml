name: Clean & Rebuild

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # 1. Ensure all required modules are in settings.gradle
      - name: Add missing modules to settings.gradle
        run: |
          for mod in dnbglfw forge_installer; do
            if ! grep -q "':$mod'" settings.gradle; then
              echo "include ':$mod'" >> settings.gradle
            fi
          done

      # 2. Ensure productFlavors in app_fearlauncher/build.gradle
      - name: Add productFlavors if missing
        run: |
          if ! grep -q "productFlavors" app_fearlauncher/build.gradle; then
            sed -i "/flavorDimensions/a \    productFlavors {\n        full { dimension \"runtime\" }\n        noruntime { dimension \"runtime\"; versionNameSuffix \"-noruntime\" }\n    }" app_fearlauncher/build.gradle
          fi

      # 3. Commit config fixes (if any)
      - name: Commit config fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.gradle app_fearlauncher/build.gradle
          git commit -m "Ensure modules and flavors" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Clean Gradle cache and project build directories
      - name: Clean everything
        run: |
          ./gradlew clean
          rm -rf ~/.gradle/caches/

      # 5. Build APK
      - name: Build APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

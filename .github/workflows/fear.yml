name: Final Build with Flavors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Clone original PojavLauncher
        run: git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher.git /tmp/pojav

      - name: Copy original build.gradle
        run: cp /tmp/pojav/app_pojavlauncher/build.gradle app_fearlauncher/build.gradle

      - name: Rebrand namespace & applicationId
        run: |
          sed -i "s/namespace 'git\.artdeell\.mojo'/namespace 'net.kdt.fearlaunch'/" app_fearlauncher/build.gradle
          sed -i 's/applicationId "git\.artdeell\.mojo"/applicationId "com.fearlauncher.app"/' app_fearlauncher/build.gradle
          sed -i 's/git\.artdeell\.mojo/com.fearlauncher.app/g' app_fearlauncher/build.gradle

      # Inject productFlavors right after flavorDimensions line
      - name: Inject productFlavors block
        run: |
          sed -i '/flavorDimensions\s*=\s*\[/a\    productFlavors {\n        full {\n            dimension "runtime"\n        }\n        noruntime {\n            dimension "runtime"\n            versionNameSuffix "-noruntime"\n        }\n    }' app_fearlauncher/build.gradle

      # Remove the entire afterEvaluate block (which causes Groovy errors)
      - name: Remove afterEvaluate block
        run: |
          # Remove lines from 'afterEvaluate {' to '}' at the same indent level
          sed -i '/^afterEvaluate {/,/^}/d' app_fearlauncher/build.gradle

      - name: Ensure required modules in settings.gradle
        run: |
          for mod in dnbglfw forge_installer; do
            if ! grep -q "':$mod'" settings.gradle; then
              echo "include ':$mod'" >> settings.gradle
            fi
          done

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add productFlavors, remove afterEvaluate" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

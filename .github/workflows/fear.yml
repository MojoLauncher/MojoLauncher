name: Final Build with Flavors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Clone original PojavLauncher
        run: git clone --depth 1 https://github.com/PojavLauncherTeam/PojavLauncher.git /tmp/pojav

      - name: Copy original build.gradle
        run: cp /tmp/pojav/app_pojavlauncher/build.gradle app_fearlauncher/build.gradle

      - name: Rebrand namespace & applicationId
        run: |
          sed -i "s/namespace 'git\.artdeell\.mojo'/namespace 'net.kdt.fearlaunch'/" app_fearlauncher/build.gradle
          sed -i 's/applicationId "git\.artdeell\.mojo"/applicationId "com.fearlauncher.app"/' app_fearlauncher/build.gradle
          sed -i 's/git\.artdeell\.mojo/com.fearlauncher.app/g' app_fearlauncher/build.gradle

      # ✅ FIX 1: Remove afterEvaluate via external script file (No heredoc syntax issues)
      - name: Remove afterEvaluate blocks completely
        run: |
          cat > /tmp/fix_afterevaluate.py << 'PYEOF'
          import re

          path = "app_fearlauncher/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          pattern = r'afterEvaluate\s*\{(?:[^{}]|\{(?:[^{}]|\{[^{}]*\})*\})*\}'
          cleaned = re.sub(pattern, '', content, flags=re.DOTALL)

          if cleaned != content:
              with open(path, "w") as f:                  f.write(cleaned)
              print("✅ Successfully removed afterEvaluate block(s)")
          else:
              print("ℹ️ No afterEvaluate block found to remove")
          PYEOF
          python3 /tmp/fix_afterevaluate.py

      # ✅ FIX 2: Inject productFlavors via external script file
      - name: Inject productFlavors safely
        run: |
          cat > /tmp/inject_flavors.py << 'PYEOF'
          import re

          path = "app_fearlauncher/build.gradle"
          with open(path, "r") as f:
              content = f.read()

          if "productFlavors" in content and "full {" in content:
              print("ℹ️ productFlavors already exist, skipping injection")
          else:
              flavors_block = '''
              flavorDimensions "runtime"
              productFlavors {
                  full {
                      dimension "runtime"
                  }
                  noruntime {
                      dimension "runtime"
                      versionNameSuffix "-noruntime"
                  }
              }
          '''
              pattern = r'(android\s*\{)'
              if re.search(pattern, content):
                  content = re.sub(pattern, r'\1' + flavors_block, content, count=1)
                  with open(path, "w") as f:
                      f.write(content)
                  print("✅ productFlavors injected successfully inside android {} block")
              else:
                  raise Exception("❌ Could not find android {} block in build.gradle!")
          PYEOF
          python3 /tmp/inject_flavors.py

      - name: Validate build.gradle syntax
        run: |
          echo "=== Checking for remaining afterEvaluate ==="
          grep -n "afterEvaluate" app_fearlauncher/build.gradle && echo "⚠️ WARNING: afterEvaluate still exists!" || echo "✅ No afterEvaluate found"
          echo "=== Checking for productFlavors ==="
          grep -n "productFlavors" app_fearlauncher/build.gradle && echo "✅ productFlavors present" || echo "❌ ERROR: productFlavors missing!"
      - name: Ensure required modules in settings.gradle
        run: |
          for mod in dnbglfw forge_installer; do
            if ! grep -q "':$mod'" settings.gradle; then
              echo "include ':$mod'" >> settings.gradle
            fi
          done

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix: Add productFlavors, remove afterEvaluate via Python script" || echo "No changes to commit"
          git push

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle & NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_HOME }}/ndk
          key: ${{ runner.os }}-fearlauncher-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-fearlauncher-

      - name: Clean Gradle Cache
        run: |
          chmod +x gradlew
          ./gradlew clean --no-daemon || true

      - name: Build APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug --no-daemon --stacktrace
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk

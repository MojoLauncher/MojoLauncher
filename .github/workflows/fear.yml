name: Complete Fix & Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
      MOJOPUB_KEYSTORE_PASSWORD: ${{ secrets.MOJOPUB_KEYSTORE_PASSWORD }}
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true   # ensures forge_installer and dnbglfw are present

      # 1. Ensure all required modules are included in settings.gradle
      - name: Add missing modules to settings.gradle
        run: |
          for module in dnbglfw forge_installer; do
            if ! grep -q "':$module'" settings.gradle; then
              echo "include ':$module'" >> settings.gradle
            fi
          done

      # 2. Ensure productFlavors exist in app_fearlauncher/build.gradle
      - name: Add productFlavors if missing
        run: |
          if ! grep -q "productFlavors" app_fearlauncher/build.gradle; then
            sed -i "/flavorDimensions/a \    productFlavors {\n        full { dimension \"runtime\" }\n        noruntime { dimension \"runtime\"; versionNameSuffix \"-noruntime\" }\n    }" app_fearlauncher/build.gradle
          fi

      # 3. Commit configuration fixes
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.gradle app_fearlauncher/build.gradle
          git commit -m "Include all required modules and ensure flavors" || echo "No changes"
          git push

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          ./gradlew :app_fearlauncher:assembleFullDebug
          mkdir -p out
          cp app_fearlauncher/build/outputs/apk/full/debug/*.apk out/FearLauncher.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FearLauncher
          path: out/FearLauncher.apk
